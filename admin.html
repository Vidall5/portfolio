<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Portfólio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="data.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0b0b0d;
    --panel:#141418;
    --line:rgba(255,255,255,.1);
    --line-2:rgba(255,255,255,.18);
    --muted:rgba(255,255,255,.55);
    --accent:#5b8def;
    --danger:#e05656;
    --ok:#3cb371;
  }
  html,body{background:var(--bg);color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  .wrap{max-width:820px;margin:0 auto;padding:40px 24px 80px}

  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;gap:16px;flex-wrap:wrap}
  h1{font-size:22px;font-weight:700;letter-spacing:-.01em}
  .top-actions{display:flex;gap:8px;flex-wrap:wrap}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:20px}
  .panel h2{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}

  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
  input[type=text],input[type=url],textarea{
    width:100%;background:#0b0b0d;color:#fff;
    border:1px solid var(--line-2);border-radius:8px;
    padding:10px 12px;font-family:inherit;font-size:14px;
    transition:border-color .15s ease;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:70px;font-family:'Inter',sans-serif}

  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:9px 14px;border-radius:8px;border:1px solid var(--line-2);
    background:#1e1e24;color:#fff;font:inherit;font-size:13px;font-weight:500;
    cursor:pointer;transition:background .15s ease, border-color .15s ease;
  }
  .btn:hover{background:#26262d;border-color:rgba(255,255,255,.28)}
  .btn.primary{background:var(--accent);border-color:var(--accent)}
  .btn.primary:hover{background:#4a7ce0;border-color:#4a7ce0}
  .btn.danger{color:var(--danger);border-color:rgba(224,86,86,.3)}
  .btn.danger:hover{background:rgba(224,86,86,.12);border-color:var(--danger)}
  .btn.ghost{background:transparent}

  .cards{display:flex;flex-direction:column;gap:12px}
  .card-row{
    display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;
    padding:14px;background:#0b0b0d;border:1px solid var(--line);border-radius:10px;
  }
  .card-row .field{margin:0}
  .card-row .actions{display:flex;flex-direction:column;gap:6px}
  .drag-handle{
    display:flex;flex-direction:column;justify-content:center;
    color:var(--muted);cursor:grab;padding:0 4px;font-size:16px;user-select:none;
  }
  .card-row.dragging{opacity:.5}

  .add-btn{
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:14px;border:1px dashed var(--line-2);border-radius:10px;
    background:transparent;color:var(--muted);font:inherit;font-size:13px;cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .add-btn:hover{border-color:var(--accent);color:var(--accent)}

  .save-bar{
    position:sticky;bottom:20px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:14px 18px;
    background:rgba(20,20,24,.92);backdrop-filter:blur(10px);
    border:1px solid var(--line-2);border-radius:12px;
    box-shadow:0 12px 32px rgba(0,0,0,.5);
    margin-top:24px;
  }
  .save-bar .status{font-size:13px;color:var(--muted)}
  .save-bar .status.ok{color:var(--ok)}
  .save-bar .actions{display:flex;gap:8px}

  @media (max-width:600px){
    .card-row{grid-template-columns:1fr}
    .card-row .actions{flex-direction:row;justify-content:flex-end}
    .save-bar{flex-direction:column;align-items:stretch}
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Admin — Portfólio</h1>
    <div class="top-actions">
      <a class="btn ghost" href="index.html" target="_blank">Ver site ↗</a>
      <button class="btn primary" id="btnDownload">Baixar data.js</button>
      <button class="btn" id="btnExport">Exportar JSON</button>
      <button class="btn" id="btnImport">Importar JSON</button>
      <input type="file" id="importFile" accept="application/json" hidden />
      <button class="btn danger" id="btnReset">Resetar</button>
    </div>
  </header>

  <section class="panel">
    <h2>Perfil</h2>
    <div class="field">
      <label for="domain">Domínio</label>
      <input type="text" id="domain" placeholder="vidall7x.com" />
    </div>
    <div class="field">
      <label for="ig">Link do Instagram</label>
      <input type="url" id="ig" placeholder="https://www.instagram.com/seuuser/" />
    </div>
    <div class="field">
      <label for="bio">Bio (aceita &lt;br&gt; pra quebra de linha)</label>
      <textarea id="bio" placeholder="Desenvolvedor web 🇧🇷&lt;br&gt;Sites, web apps e sistemas sob medida."></textarea>
    </div>
  </section>

  <section class="panel">
    <h2>Projetos</h2>
    <div class="cards" id="cards"></div>
    <button class="add-btn" id="btnAdd" style="margin-top:12px">＋ Adicionar projeto</button>
  </section>

  <div class="save-bar">
    <div class="status" id="status">Alterações não salvas.</div>
    <div class="actions">
      <button class="btn ghost" id="btnDiscard">Descartar</button>
      <button class="btn primary" id="btnSave">Salvar</button>
    </div>
  </div>

</div>

<script>
  const DEFAULT_DATA = window.PORTFOLIO_DATA || {
    domain: "", ig: "", bio: "", cards: []
  };

  const $ = s => document.querySelector(s);
  const cardsEl = $('#cards');
  const domainEl = $('#domain');
  const igEl = $('#ig');
  const bioEl = $('#bio');
  const statusEl = $('#status');

  let data = load();

  function load(){
    try{
      const raw = localStorage.getItem('portfolio_data');
      if(raw) return { ...JSON.parse(JSON.stringify(DEFAULT_DATA)), ...JSON.parse(raw) };
    }catch(e){}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  function markDirty(){
    statusEl.textContent = 'Alterações não salvas.';
    statusEl.classList.remove('ok');
  }

  function render(){
    domainEl.value = data.domain || '';
    igEl.value = data.ig || '';
    bioEl.value = data.bio || '';
    cardsEl.innerHTML = '';
    data.cards.forEach((c, i) => {
      const row = document.createElement('div');
      row.className = 'card-row';
      row.draggable = true;
      row.dataset.i = i;
      row.innerHTML = `
        <div class="field">
          <label>Nome do projeto</label>
          <input type="text" data-field="title" value="${escapeAttr(c.title)}" placeholder="Ex: FH Logística" />
        </div>
        <div class="field">
          <label>URL</label>
          <input type="url" data-field="url" value="${escapeAttr(c.url)}" placeholder="https://..." />
        </div>
        <div class="actions">
          <button class="btn ghost" data-move="up" title="Mover pra cima">↑</button>
          <button class="btn ghost" data-move="down" title="Mover pra baixo">↓</button>
          <button class="btn danger" data-remove title="Remover">×</button>
        </div>
      `;
      cardsEl.appendChild(row);
    });
  }

  function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }

  cardsEl.addEventListener('input', e => {
    const row = e.target.closest('.card-row');
    if(!row) return;
    const i = +row.dataset.i;
    const field = e.target.dataset.field;
    if(field){ data.cards[i][field] = e.target.value; markDirty(); }
  });

  cardsEl.addEventListener('click', e => {
    const row = e.target.closest('.card-row');
    if(!row) return;
    const i = +row.dataset.i;
    if(e.target.hasAttribute('data-remove')){
      if(confirm('Remover este projeto?')){ data.cards.splice(i,1); render(); markDirty(); }
    } else if(e.target.dataset.move === 'up' && i > 0){
      [data.cards[i-1], data.cards[i]] = [data.cards[i], data.cards[i-1]];
      render(); markDirty();
    } else if(e.target.dataset.move === 'down' && i < data.cards.length-1){
      [data.cards[i+1], data.cards[i]] = [data.cards[i], data.cards[i+1]];
      render(); markDirty();
    }
  });

  domainEl.addEventListener('input', () => { data.domain = domainEl.value.trim(); markDirty(); });
  igEl.addEventListener('input', () => { data.ig = igEl.value; markDirty(); });
  bioEl.addEventListener('input', () => { data.bio = bioEl.value; markDirty(); });

  $('#btnAdd').addEventListener('click', () => {
    data.cards.push({ title:'Novo projeto', url:'https://' });
    render(); markDirty();
  });

  $('#btnSave').addEventListener('click', () => {
    localStorage.setItem('portfolio_data', JSON.stringify(data));
    statusEl.textContent = 'Salvo. Recarregue o site pra ver.';
    statusEl.classList.add('ok');
  });

  $('#btnDiscard').addEventListener('click', () => {
    if(!confirm('Descartar alterações não salvas?')) return;
    data = load(); render();
    statusEl.textContent = 'Alterações descartadas.';
    statusEl.classList.remove('ok');
  });

  $('#btnReset').addEventListener('click', () => {
    if(!confirm('Restaurar dados padrão? Isso apaga suas edições salvas.')) return;
    localStorage.removeItem('portfolio_data');
    data = load(); render();
    statusEl.textContent = 'Dados restaurados ao padrão. Salve pra confirmar.';
    statusEl.classList.remove('ok');
  });

  $('#btnDownload').addEventListener('click', () => {
    const content = "// Dados do portfólio — edite aqui, commit, push. Vercel faz o deploy sozinho.\nwindow.PORTFOLIO_DATA = " + JSON.stringify(data, null, 2) + ";\n";
    const blob = new Blob([content], {type:'application/javascript'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'data.js';
    a.click();
    statusEl.textContent = 'data.js baixado. Substitua o arquivo no repo e faça git push.';
    statusEl.classList.add('ok');
  });

  $('#btnExport').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'portfolio-data.json';
    a.click();
  });

  $('#btnImport').addEventListener('click', () => $('#importFile').click());
  $('#importFile').addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const parsed = JSON.parse(ev.target.result);
        if(!parsed.cards || !Array.isArray(parsed.cards)) throw new Error('formato inválido');
        data = parsed; render(); markDirty();
        statusEl.textContent = 'JSON importado. Clique em Salvar pra aplicar.';
      }catch(err){ alert('Arquivo inválido: '+err.message); }
    };
    reader.readAsText(file);
  });

  render();
</script>

</body>
</html>
